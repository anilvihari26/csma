<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>SafeGuard</h1>
                <p>Create Your Account</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab" data-tab="login">Login</div>
                <div class="auth-tab active" data-tab="register">Register</div>
            </div>

            <!-- Registration Form -->
            <form id="registerForm" class="auth-form active">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="error-message" id="regNameError">Please enter your full name</span>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <span class="error-message" id="regEmailError">Please enter a valid email address</span>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="regMobile" placeholder="Enter mobile number (10 digits)" maxlength="10" required>
                        <i class="fas fa-phone"></i>
                    </div>
                    <span class="error-message" id="regMobileError">Please enter a valid 10-digit mobile number</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                            <i class="fas fa-lock"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="regPasswordError">Password must be at least 6 characters</span>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                            <i class="fas fa-lock"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="regConfirmPasswordError">Passwords do not match</span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Gender (Optional)</label>
                        <div class="input-wrapper">
                            <select id="regGender" class="input-field">
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                            <i class="fas fa-venus-mars" style="left: 15px;"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Location (Optional)</label>
                        <div class="input-wrapper">
                            <input type="text" id="regLocation" placeholder="Enter your city">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i>
                    Register
                </button>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn btn-google" onclick="loginWithGoogle()">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                </div>

                <div class="auth-footer">
                    Already have an account? <a href="index.html">Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
